<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowpay is a payment platform</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <!-- Sidebar stary -->
     <aside>
        <div class="logo">
            <i data-lucide="loader-pinwheel" class="primary logo-icon"></i>
            <h1>now <span class="primary">Pay</span></h1>
        </div>
        <div class="tabs">
            <div class="tab active">
                <a href="#" class="item">
                    <i data-lucide="layout-dashboard"></i>
                    <h1>Dashboard</h1>
                </a>
            </div>
            <div class="tab">
                <a href="#" class="item">
                    <i data-lucide="message-circle"></i>
                    <h1>Messages</h1>
                    <div class="count">9+</div>
                </a>
            </div>
            <div class="tab">
                <a href="#" class="item">
                    <i data-lucide="scroll-text"></i>
                    <h1>Invoices</h1>
                </a>
            </div>
            <div class="tab">
                <a href="#" class="item">
                    <i data-lucide="wallet"></i>
                    <h1>Wallet</h1>
                </a>
            </div>
            <div class="tab">
                <a href="#" class="item">
                    <i data-lucide="chart-column-big"></i>
                    <h1>Analytics</h1>
                </a>
            </div>
            <div class="tab">
                <a href="#" class="item">
                    <i data-lucide="monittor-dot"></i>
                    <h1>My Activity</h1>
                </a>
            </div>
            <div class="tab">
                <a href="#" class="item">
                    <i data-lucide="settings"></i>
                    <h1>Settings/h1>
                </a>
            </div>
        </div>
        <div class="bottom">
            <div class="item-tabs">
                <div class="item-tabs">
                    <i data-lucide="hand-helping"></i>
                    <h3>Get Help</h3>
                </div>
                <div class="item-tabs">
                    <i data-lucide="sun-moon"></i>
                    <h3>Theme</h3>
                </div>
            </div>

            <div class="user">
                <div class="profile">
                    <img src="" alt="">
                </div>
            </div>


        </div>
     </aside>
    <!-- sidebar end -->
 

    <!-- lucide icons inclussion -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
